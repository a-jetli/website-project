<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AJ | Resume</title>
  <meta name="description" content="Resume of Ansh Jetli — CS student at Rutgers University.">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Lora:ital,wght@0,400;0,500;1,400&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/sections.css">
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='12' fill='%230d0f14'/><text y='72' x='50' text-anchor='middle' font-size='52' font-family='Georgia,serif' font-weight='600' fill='%2360a5fa'>AJ</text></svg>">
  <meta property="og:title" content="Ansh Jetli | Resume">
  <meta property="og:description" content="Ansh's Resume">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://a-jetli.github.io/resume.html">
</head>

<body>
  <div class="layout">
    <aside class="left-panel">
      <!-- <div class="photo-placeholder">photo</div> -->
      <div class="identity">
        <h1 class="name">Ansh Jetli</h1>
        <p class="occupation">CS Student</p>
      </div>
      <div class="nav-footer">
        <nav>
          <a href="index.html">Home</a>
          <a href="projects.html">Projects</a>
          <a href="resume.html">Resume</a>
        </nav>
        <div class="social-links">
          <a href="https://github.com/a-jetli" target="_blank" aria-label="GitHub" title="GitHub">
            <i class="fab fa-github"></i>
          </a>
          <a href="https://www.linkedin.com/in/anshjetli/" target="_blank" aria-label="LinkedIn" title="LinkedIn">
            <i class="fab fa-linkedin"></i>
          </a>
          <a href="mailto:ansh.jetli@gmail.com" aria-label="Email" title="Email">
            <i class="fas fa-envelope"></i>
          </a>
        </div>
        <div class="theme-switcher">
          <button class="theme-icon" id="theme-toggle">&#9680;</button>
          <div class="theme-menu" id="theme-menu">
            <button data-theme="light">Light</button>
            <button data-theme="dark">Dark</button>
            <div class="theme-submenu-wrapper">
              <button class="has-submenu">Other ⏩</button>
              <div class="theme-submenu" id="theme-submenu">
                <button data-theme="coral">Coral</button>
                <button data-theme="wisteria">Wisteria</button>
                <button data-theme="stormy">Stormy Morning</button>
                <button id="custom-trigger">— Custom —</button>
              </div>
            </div>
            <button id="glow-toggle">Glow: On</button>
          </div>
        </div>
      </div>
    </aside>

    <main class="right-panel">
      <section id="resume">
        <h2 class="bio-heading"><span style="color: var(--accent)">Resume</span></h2>
        <iframe src="ansh_resume_web.pdf" width="100%" height="900px" style="border: none; margin-top: 1rem;"></iframe>
        <a href="ansh_resume_web.pdf" download
          style="display: inline-block; margin-top: 1.5rem; color: var(--accent);">Download</a>
      </section>
    </main>
  </div>

  <div class="custom-prompt" id="custom-prompt">
    <h3>Custom Theme</h3>
    <label>Background<input type="color" data-var="--bg" value="#ffffff"></label>
    <label>Surface<input type="color" data-var="--bg-subtle" value="#f0f0f0"></label>
    <label>Text<input type="color" data-var="--text" value="#000000"></label>
    <label>Muted Text<input type="color" data-var="--text-muted" value="#666666"></label>
    <label>Accent<input type="color" data-var="--accent" value="#0077cc"></label>
    <label>Border<input type="color" data-var="--border" value="#cccccc"></label>
    <button id="custom-apply">Apply</button>
    <button id="custom-close">Cancel</button>
  </div>

  <footer>
    <p>Designed & built by Ansh Jetli · 2026 </p>
  </footer>

  <script src="js/theme.js"></script>
  <script src="js/effects.js"></script>
</body>

</html>
